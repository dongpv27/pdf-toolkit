name: pdf_toolkit
description: "PDF Toolkit - convert, merge and compress PDFs offline."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.7
  image_picker: ^1.1.2
  pdf: ^3.11.1
  path_provider: ^2.1.4
  intl: ^0.19.0
  file_picker: ^8.1.2
  syncfusion_flutter_pdf: ^27.1.48
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
